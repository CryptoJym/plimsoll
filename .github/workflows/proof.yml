name: signal-fidelity proof

on:
  push:
    branches: [main]
  pull_request:

jobs:
  proof:
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Run signal-fidelity proof
        run: pnpm proof

      - name: Run strict isolated resource proof
        run: pnpm proof:resource --require-integrated --receipt evidence/resource-proof.json

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-fidelity-evidence
          path: evidence/
          if-no-files-found: warn
