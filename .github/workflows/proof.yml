name: signal-fidelity proof

on:
  push:
    branches: [main]
  pull_request:

jobs:
  proof:
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Keep the default PR synthetic-merge checkout, but fetch its ancestry
          # so the out-of-band source head can be proven to be an ancestor.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Prove event allocation conservation
        run: pnpm proof:allocation

      - name: Prove source installer and read-only doctor
        run: pnpm proof:install-doctor

      - name: Prove atomic no-follow LaunchAgent manifest lifecycle
        run: pnpm proof:launch-agent

      - name: Prove surgical Codex config reconciliation
        run: pnpm proof:codex-config-apply

      - name: Prove atomic Claude config reconciliation
        run: pnpm proof:claude-config-apply

      - name: Prove atomic local lifecycle transactions
        run: pnpm proof:lifecycle

      - name: Prove local HTTP trust boundary
        run: pnpm proof:http-boundary

      - name: Prove shipped dashboard projection truth
        run: pnpm proof:dashboard

      - name: Prove shipped dashboard browser security
        run: pnpm proof:dashboard-security

      - name: Prove paired attempts and explicit technique exposure
        run: pnpm proof:learning-facts

      - name: Run signal-fidelity proof
        run: pnpm proof

      - name: Prove versioned learning-metric truth
        run: pnpm proof:metric-truth

      - name: Prove bounded learning evidence packets
        run: pnpm proof:learning-evidence

      - name: Prove suppression receipt capture-to-upload parity
        run: pnpm proof:outbox

      - name: Prove managed metadata-only privacy mode
        run: pnpm proof:privacy-mode --receipt evidence/privacy-mode-proof.json

      - name: Prove transactional join and workspace isolation
        run: pnpm proof:join-isolation

      - name: Prove immutable outcome timeline and bounded recovery
        run: pnpm proof:outcome-timeline

      - name: Prove source-only integrated learning and fleet flow
        run: |
          pnpm proof:system-e2e:path-normalization
          pnpm proof:system-e2e -- --receipt evidence/system-e2e-proof.json --expected-source-commit "${{ github.event.pull_request.head.sha || github.sha }}"
          pnpm proof:system-e2e:verify -- --receipt evidence/system-e2e-proof.json --expected-source-commit "${{ github.event.pull_request.head.sha || github.sha }}"
          pnpm proof:system-e2e -- --receipt evidence/system-e2e-proof-repeat.json --compare-deterministic-receipt evidence/system-e2e-proof.json --expected-source-commit "${{ github.event.pull_request.head.sha || github.sha }}"
          pnpm proof:system-e2e:verify -- --receipt evidence/system-e2e-proof-repeat.json --expected-source-commit "${{ github.event.pull_request.head.sha || github.sha }}"
          pnpm proof:system-e2e:tamper -- --receipt evidence/system-e2e-proof-repeat.json --expected-source-commit "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Run strict isolated resource proof
        run: pnpm proof:resource --require-integrated --receipt evidence/resource-proof.json

      - name: Prove finalized privacy failures fail closed
        run: pnpm proof:resource-finalization

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-fidelity-evidence
          path: evidence/
          if-no-files-found: warn
